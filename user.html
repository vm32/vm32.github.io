<html>
  <head>
    <title>Image and Information</title>
    <style>
        img {
            max-width: 50%;
        }
        table {
            width: 50%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #dddddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #dddddd;
        }
    </style>
  </head>
  <body>
    <img src="path/to/image.jpg" alt="Image">
    <table>
        <tr>
            <th>Information</th>
            <th>Details</th>
        </tr>
        <tr>
            <td>Color:</td>
            <td>Red</td>
        </tr>
        <tr>
            <td>Type:</td>
            <td>Sedan</td>
        </tr>
        <tr>
            <td>Model:</td>
            <td>Honda Civic</td>
        </tr>
        <tr>
            <td>Date:</td>
            <td>01/01/2021</td>
        </tr>
        <tr>
            <td>ID Number:</td>
            <td>123456</td>
        </tr>
        <tr>
            <td>Phone Number:</td>
            <td>555-555-5555</td>
        </tr>
    </table>
  </body>
</html>
